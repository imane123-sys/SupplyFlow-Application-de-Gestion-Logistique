
<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Produits</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f4f7fb, #eaf1f8);
            color: #1f2937;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 32px;
            color: #111827;
            margin-bottom: 10px;
        }

        .page-header p {
            color: #6b7280;
            font-size: 15px;
        }

        .card {
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 25px;
            margin-bottom: 25px;
        }

        .card h2 {
            font-size: 22px;
            margin-bottom: 20px;
            color: #0f172a;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
        }

        .form-group input {
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
            transition: 0.25s ease;
            background-color: #f9fafb;
        }

        .form-group input:focus {
            border-color: #22c55e;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.12);
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-add {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(34, 197, 94, 0.25);
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 850px;
        }

        thead tr {
            background: linear-gradient(135deg, #0f766e, #14b8a6);
            color: white;
        }

        th {
            padding: 16px 14px;
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        td {
            padding: 14px 12px;
            text-align: center;
            border-bottom: 1px solid #e5e7eb;
            font-size: 14px;
            color: #374151;
        }

        tbody tr {
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        tbody tr:hover {
            background-color: #f9fafb;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .price {
            font-weight: 700;
            color: #16a34a;
        }

        .stock {
            font-weight: 600;
            color: #2563eb;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .action-form {
            display: inline-block;
            margin: 0;
        }

        .btn-edit {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            padding: 10px 14px;
        }

        .btn-edit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(59, 130, 246, 0.22);
        }

        .btn-delete {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            padding: 10px 14px;
        }

        .btn-delete:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(239, 68, 68, 0.22);
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: #6b7280;
            font-size: 15px;
        }

        @media (max-width: 768px) {
            body {
                padding: 20px 12px;
            }

            .card {
                padding: 18px;
                border-radius: 14px;
            }

            .page-header h1 {
                font-size: 26px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .actions {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="page-header">
        <h1>Gestion des des Fournisseurs</h1>
    </div>

    <div class="card">
        <h2>Ajouter un Fournisseur</h2>
        <form action="/fournisseurs" method="post">
            <div class="form-grid">
                <div class="form-group">
                    <label for="nomFournisseur">Nom du Fournisseur</label>
                    <input type="text" id="nomFournisseur" name="nomFournisseur" placeholder="Apple" required>
                </div>

                <div class="form-group">
                    <label for="ville">ville</label>
                    <input type="text" id="ville" name="ville" placeholder="CasaBlanca" required>
                </div>

                <div class="form-group">
                    <label for="telephone">Telephone</label>
                    <input type="number" id="telephone" name="telephone" placeholder="0604256667"  required>
                </div>



                <div class="form-group">
                    <button type="submit" class="btn btn-add"> Ajouter</button>
                </div>
            </div>
        </form>
    </div>

    <div class="card">
        <h2>Liste des Fournisseurs</h2>

        <div class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nom Fournisseur</th>
                    <th>ville</th>
                    <th>telephone</th>

                </tr>
                </thead>

                <tbody>
                <tr th:each="fournisseur : ${fournisseurs}">
                    <td th:text="${fournisseur.id}"></td>
                    <td th:text="${fournisseur.nomF}"></td>
                    <td th:text="${fournisseur.ville}"></td>
                    <td th:text="${fournisseur.telephone}"></td>

                </tr>

                <tr th:if="${#lists.isEmpty(fournisseurs)}">
                    <td colspan="6" class="empty-state">Aucun Fournisseur disponible pour le moment.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
